<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCNA Learning App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header id="app-header">
        <h1 id="chapter-title">Loading...</h1>
        <p class="subtitle" id="chapter-subtitle"></p>
        
        <!-- Chapter Selector Hamburger -->
        <div class="chapter-menu">
            <button class="hamburger" id="hamburger-btn" onclick="toggleChapterMenu()">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
            <div class="chapter-dropdown" id="chapter-dropdown">
                <h4>📖 Select Chapter</h4>
                <div class="chapter-list" id="chapter-list">
                    <!-- Dynamically populated -->
                </div>
            </div>
        </div>
    </header>

    <nav class="lesson-nav" id="lesson-nav">
        <!-- Dynamically populated -->
    </nav>

    <main class="content-area" id="content-area">
        <!-- Dynamically populated -->
    </main>

    <!-- LAB POPUP -->
    <div class="lab-overlay hidden" id="lab-overlay" onclick="closeLab()"></div>
    <div class="lab-panel hidden" id="lab-panel">
        <div class="lab-header">
            <h3 id="lab-title">Lab</h3>
            <button class="close-btn" onclick="closeLab()">✕</button>
        </div>
        <div class="lab-content" id="lab-content">
            <!-- Dynamically populated -->
        </div>
    </div>

    <!-- Chapter Summary -->
    <section class="summary-section" id="summary-section">
        <h2>📚 Chapter Summary</h2>
        <div class="summary-grid" id="summary-grid">
            <!-- Dynamically populated -->
        </div>
    </section>

    <footer>
        <p>KCNA Exam Preparation | Dynamic Learning App</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
